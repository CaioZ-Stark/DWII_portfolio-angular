<div class="container">
  <div class="portfolio-card">

    <h1>{{ title() }}</h1>

    <p class="subtitle">
      Bem-vindo ao meu portfólio 🚀
    </p>

    <hr>

    <div class="content">
      <p>Olá, tudo bem com você?</p>

      <p>
        Meu nome é
        <span class="nome">{{autor}}</span>.
      </p>

      <p>
        Sou estudante do IFPR e estou no 3º ano do Técnico em Informática.
      </p>

      <p>
        Estou aprendendo a criar aplicações modernas utilizando Angular.
      </p>

      <button mat-raised-button color="primary">Bnt body</button><!-- igual o CSS do body-->
      <button mat-stroked-button color="accent">Btn Normal</button><!-- igual o CSS padrão-->
      <button mat-flat-button color="warn">Bnt de erro</button><!-- (ao contrario do CSS padrão)-->
    </div>

  </div>
</div>
