<mat-toolbar color="primary">

  <button mat-icon-button (click)="drawer.toggle()">
    <mat-icon>menu</mat-icon>
  </button>

  <span>Meu Portfólio</span>

  <a mat-button routerLink="/" routerLinkActive="ativo"
     [routerLinkActiveOptions]="{ exact: true }">
    Início
  </a>

  <a mat-button routerLink="/sobre" routerLinkActive="ativo">
    Sobre
  </a>

  <a mat-button routerLink="/projetos" routerLinkActive="ativo">
    Projetos
  </a>

  <a mat-button routerLink="/contat" routerLinkActive="ativo">
    Contato
  </a>

</mat-toolbar>

<mat-drawer-container class="container">

  <mat-drawer #drawer class="sidenav" mode="over">

    <mat-nav-list class="nav_lista">
      <a mat-list-item routerLink="">
        <mat-icon>home</mat-icon>
        Home
      </a>

      <a mat-list-item routerLink="sobre">
        <mat-icon>person_search</mat-icon>
        Sobre
      </a>

      <a mat-list-item routerLink="projetos">
        <mat-icon>work</mat-icon>
        Projetos
      </a>

      <a mat-list-item routerLink="contat">
        <mat-icon>mail</mat-icon>
        Contato
      </a>
    </mat-nav-list>

  </mat-drawer>

  <mat-drawer-content>
    <main style="padding:24px;">
      <router-outlet></router-outlet>
    </main>
  </mat-drawer-content>

</mat-drawer-container>
